services:
  node:
    image: hardhat-docker-node:latest
    build:
      context: https://github.com/perusworld/hardhat-docker.git#main
      dockerfile: Dockerfile
    environment:
      - CHAIN_ID=${CHAIN_ID:-31337}
      - AUTO_MINE=${AUTO_MINE:-true}
      - MINE_INTERVAL=${MINE_INTERVAL:-0}
      - HARDHAT_NODE_LOGGING=${HARDHAT_NODE_LOGGING:-true}
      - GAS=${GAS}
      - GAS_PRICE=${GAS_PRICE:-0}
      - INITIAL_BASE_FEE_PER_GAS=${INITIAL_BASE_FEE_PER_GAS:-0}
    ports:
      - 8545:8545

  explorer:
    image: hardhat-docker-explorer:latest
    build:
      context: https://github.com/perusworld/hardhat-docker.git#main
      dockerfile: block-explorer/Dockerfile
    depends_on:
      - node
    environment:
      - RPC_URL=http://node:8545
      - EXPLORER_API_HOST=0.0.0.0
      - EXPLORER_API_PORT=8787
      - EXPLORER_DB_PATH=/data/explorer.sqlite
      - EXPLORER_ARTIFACTS_PATH=/workspace/artifacts
      - EXPLORER_IGNITION_DEPLOYMENTS_PATH=/workspace/ignition/deployments
      - EXPLORER_ADDRESS_LABELS_PATH=/workspace/address-labels.example.env
      - EXPLORER_STATIC_PATH=/workspace/block-explorer/dist
    ports:
      - 8787:8787
    volumes:
      - explorer-data:/data

volumes:
  explorer-data:
